<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Googleに保存するアンケート</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; width: 100%; font-size: 16px; }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #cccccc; }
    </style>
</head>
<body>

    <h2>ユーザーアンケート（Google保存版）</h2>
    
    <form id="surveyForm">
        <div class="form-group">
            <label for="name">お名前：</label>
            <input type="text" id="name" required placeholder="山田 太郎">
        </div>

        <div class="form-group">
            <label for="satisfaction">このサイトの満足度：</label>
            <select id="satisfaction" required>
                <option value="">選択してください</option>
                <option value="満足">満足</option>
                <option value="普通">普通</option>
                <option value="不満">不満</option>
            </select>
        </div>

        <div class="form-group">
            <label for="comments">ご意見・ご要望：</label>
            <textarea id="comments" rows="4" placeholder="自由にご記入ください"></textarea>
        </div>

        <button type="submit" id="submitBtn">アンケートを送信する</button>
    </form>

    <script>
        // ⚠️ ここにステップ1でコピーしたGoogle Apps ScriptのURLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxmc8EdCh0bGRpyrE4fNI3yerAgWd-1vPEE3iwJpW-QTJ68P667u8RZdwbtKuwVB_5d8Q/exec";

        document.getElementById('surveyForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "送信中...";

            // 送信するデータ
            const data = {
                name: document.getElementById('name').value,
                satisfaction: document.getElementById('satisfaction').value,
                comments: document.getElementById('comments').value
            };

            // fetch APIを使ってGoogleにデータを非同期で送信（POST）
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // クロスドメイン通信のエラーを防ぐ
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
            .then(() => {
                alert("アンケートを送信しました。ご協力ありがとうございました！");
                document.getElementById('surveyForm').reset();
            })
            .catch(error => {
                console.error("エラーが発生しました:", error);
                alert("送信に失敗しました。時間をおいて再度お試しください。");
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "アンケートを送信する";
            });
        });
    </script>

</body>
</html>
