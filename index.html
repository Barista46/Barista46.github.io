                <script>
                    let currentAudio = null;
                    let currentButton = null;

                    function playAudio(id, button) {
                        const audio = document.getElementById(id);

                        // 他の音声を停止
                        if (currentAudio && currentAudio !== audio) {
                            currentAudio.pause();
                            currentAudio.currentTime = 0;

                            if (currentButton) {
                                currentButton.textContent =
                                    currentButton.dataset.label;
                            }
                        }

                        // 再生・停止切替
                        if (audio.paused) {
                            audio.play();
                            button.dataset.label = button.textContent;
                            button.textContent = "⏸ 停止";

                            currentAudio = audio;
                            currentButton = button;
                        } else {
                            audio.pause();
                            audio.currentTime = 0;
                            button.textContent = button.dataset.label;

                            currentAudio = null;
                            currentButton = null;
                        }

                        audio.onended = function() {
                            button.textContent = button.dataset.label;
                            currentAudio = null;
                            currentButton = null;
                        };
                    }
                </script>

<script>
    // あなたのGoogle Apps ScriptのURLに書き換えてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxwVgBmBLbTEHgZ7P5aLqn_9LQUZLrg3qh7h2oxF48C5SzyndBOU3OrZi1sKiC1InUG/exec";

    document.getElementById('quizForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "送信中...";

        // 送信データの組み立て（GASの受け取り側に合わせる）
        const data = {
            name: document.getElementById('name').value,
            q0: document.querySelector('input[name="q0"]:checked').value,
            q1: document.querySelector('input[name="q1"]:checked').value,
            q2: document.querySelector('input[name="q2"]:checked').value,
            q3: document.querySelector('input[name="q3"]:checked').value,
            q4: document.querySelector('input[name="q4"]:checked').value,
            q5: document.querySelector('input[name="q5"]:checked').value,
            q6: document.querySelector('input[name="q6"]:checked').value,
            q7: document.querySelector('input[name="q7"]:checked').value,
            q8: document.querySelector('input[name="q8"]:checked').value,
            q9: document.querySelector('input[name="q9"]:checked').value,
            q10: document.querySelector('input[name="q10"]:checked').value
        };

        fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(() => {
            alert("クイズの回答を送信しました！ご参加ありがとうございました。");
            document.getElementById('quizForm').reset();
        })
        .catch(error => {
            console.error("エラー:", error);
            alert("送信に失敗しました。");
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = "回答を送信する";
        });
    });
</script>
