<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アンケートフォーム</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>ユーザーアンケート</h2>
    
    <form id="surveyForm">
        <div class="form-group">
            <label for="name">お名前：</label>
            <input type="text" id="name" required placeholder="山田 太郎">
        </div>

        <div class="form-group">
            <label for="satisfaction">このサイトの満足度：</label>
            <select id="satisfaction" required>
                <option value="">選択してください</option>
                <option value="満足">満足</option>
                <option value="普通">普通</option>
                <option value="不満">不満</option>
            </select>
        </div>

        <div class="form-group">
            <label for="comments">ご意見・ご要望：</label>
            <textarea id="comments" rows="4" placeholder="自由にご記入ください（カンマは避けてください）"></textarea>
        </div>

        <button type="submit">CSVとして保存・ダウンロード</button>
    </form>

    <script>
        document.getElementById('surveyForm').addEventListener('submit', function(event) {
            event.preventDefault(); // ページのリロードを防ぐ

            // 1. フォームの入力値を取得
            const name = document.getElementById('name').value;
            const satisfaction = document.getElementById('satisfaction').value;
            // CSVの区切り文字である「カンマ」をスペースに置換してエラーを防ぐ
            const comments = document.getElementById('comments').value.replace(/,/g, ' ');

            // 2. CSVのヘッダーとデータを作成
            const headers = ["名前", "満足度", "ご意見"];
            const rows = [name, satisfaction, comments];

            // Excelなどで文字化けしないように「BOM（Byte Order Mark）」を追加
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            
            // CSV文字列の組み立て
            const csvContent = headers.join(",") + "\n" + rows.join(",");

            // 3. ダウンロード用のBlobオブジェクトを作成
            const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);

            // 4. 見えないリンクを作って自動クリックし、ダウンロードさせる
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `survey_${Date.now()}.csv`); // ファイル名にタイムスタンプを付与
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // フォームをリセット
            document.getElementById('surveyForm').reset();
            alert('アンケートデータをCSVとしてダウンロードしました。');
        });
    </script>

</body>
</html>
